<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scientific Calculator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: #f4f4f4;
    }
    .calculator {
      background: rgb(0, 0, 0);
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
      overflow: hidden;
    }
    #display {
      width: 90%;
      height: 50px;
      margin-bottom: 15px;
      text-align: right;
      font-size: 1.5em;
      padding: 10px;
      border: 1px solid #ccc;
      border-radius: 10px;
    }
    button {
      width: 60px;
      height: 50px;
      margin: 5px;
      font-size: 1em;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    button:hover {
      background: #686060;
    }
    .row {
      display: flex;
      justify-content: center;
    }
    #simple{
      position: absolute;
      top: 10px;
      right: 10px;
      font-size: 1.5rem;
      color: hsl(0, 2%, 37%);
    }
  </style>
</head>
<body>
<p id="simple">Simple<a href="Simple-Calculater.html">here</a></p>
<div class="calculator">
  <input type="text" id="display" placeholder="0" readonly>

  <div class="row">
    <button onclick="clearDisplay()">C</button>
    <button onclick="deleteLastCharacter()">DEL</button>
    <button onclick="appendToDisplay('(')">(</button>
    <button onclick="appendToDisplay(')')">)</button>
  </div>

  <div class="row">
    <button onclick="appendToDisplay('7')">7</button>
    <button onclick="appendToDisplay('8')">8</button>
    <button onclick="appendToDisplay('9')">9</button>
    <button onclick="appendToDisplay('/')">÷</button>
  </div>

  <div class="row">
    <button onclick="appendToDisplay('4')">4</button>
    <button onclick="appendToDisplay('5')">5</button>
    <button onclick="appendToDisplay('6')">6</button>
    <button onclick="appendToDisplay('*')">×</button>
  </div>

  <div class="row">
    <button onclick="appendToDisplay('1')">1</button>
    <button onclick="appendToDisplay('2')">2</button>
    <button onclick="appendToDisplay('3')">3</button>
    <button onclick="appendToDisplay('-')">−</button>
  </div>

  <div class="row">
    <button onclick="appendToDisplay('0')">0</button>
    <button onclick="appendToDisplay('.')">.</button>
    <button onclick="calculate()">=</button>
    <button onclick="appendToDisplay('+')">+</button>
  </div>

  <div class="row">
    <button onclick="appendPi()">π</button>
    <button onclick="appendE()">e</button>
    <button onclick="appendFunction('Math.sqrt(')">√</button>
    <button onclick="appendFunction('Math.pow(')">xʸ</button>
  </div>

  <div class="row">
    <button onclick="appendFunction('Math.sin(')">sin</button>
    <button onclick="appendFunction('Math.cos(')">cos</button>
    <button onclick="appendFunction('Math.tan(')">tan</button>
    <button onclick="appendFunction('Math.log10(')">log</button>
  </div>

  <div class="row">
    <button onclick="appendFunction('Math.log(')">ln</button>
    <button onclick="appendFunction('Math.pow(');appendToDisplay(' ,2)')">x²</button>
    <button onclick="appendFunction('Math.pow(');appendToDisplay(' ,3)')">x³</button>
    <button onclick="appendToDisplay('%')">%</button>
  </div>
</div>

<script>
function appendToDisplay(input) {
  document.getElementById("display").value += input;
}

function clearDisplay() {
  document.getElementById("display").value = "";
}

function deleteLastCharacter() {
  const display = document.getElementById("display");
  display.value = display.value.slice(0, -1);
}

function calculate() {
  try {
    const display = document.getElementById("display");
    let expression = display.value;

    expression = expression.replace(/(\d+)%/g, "($1/100)");
    expression = expression.replace(/π/g, (Math.PI).toFixed(2));
    expression = expression.replace(/e/g, Math.E.toFixed(2));
    

    let result = eval(expression);

    if (result === undefined || isNaN(result) || 
        result === Infinity || result === -Infinity) {
      display.value = "Error";
    } else {
      display.value = result;
    }
  } catch (error) {
    display.value = "Error";
  }
}

function appendPi() {
  document.getElementById("display").value += "π";
}

function appendE() {
  document.getElementById("display").value += "e";
}

function appendFunction(func) {
  document.getElementById("display").value += func;
}
</script>

</body>
</html>
